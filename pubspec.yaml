name: otp_forge
description: >-
  A production-ready OTP authentication package for Flutter with SMS
  Retriever integration, OTP autofill, validation, resend timers, and customizable UI.
version: 0.0.2
homepage: https://github.com/Coderkube-App/otp_forge
repository: https://github.com/Coderkube-App/otp_forge
issue_tracker: https://github.com/Coderkube-App/otp_forge/issues

topics:
  - otp
  - authentication
  - sms
  - autofill
  - verification

environment:
  sdk: ^3.11.5
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.otpforge.otp_forge
        pluginClass: OtpForgePlugin
      ios:
        pluginClass: OtpForgePlugin
      macos:
        pluginClass: OtpForgePlugin
      windows:
        pluginClass: OtpForgePluginCApi
      linux:
        pluginClass: OtpForgePlugin
      web:
        pluginClass: OtpForgeWeb
        fileName: otp_forge_web.dart
